<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gently</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <header class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h10a4 4 0 0 1 4 4v0a4 4 0 0 1-4 4H6l-2 2V4Z" />
          <path d="M20 20l-2-2h-6a4 4 0 0 1-4-4" opacity=".5" />
        </svg>
      </div>
      <div>
        <div class="brand-name">Gently</div>
        <div class="brand-sub" id="brand-sub">Claude · local</div>
      </div>
    </header>

    <div class="filter-bar" role="group" aria-label="Filter by provider">
      <button class="chip chip-claude active" data-provider="claude" aria-pressed="true">
        <span class="chip-dot"></span><span>Claude</span><span class="chip-count" data-count="claude"></span>
      </button>
      <button class="chip chip-codex active" data-provider="codex" aria-pressed="true">
        <span class="chip-dot"></span><span>Codex</span><span class="chip-count" data-count="codex"></span>
      </button>
      <button class="chip chip-gemini active" data-provider="gemini" aria-pressed="true">
        <span class="chip-dot"></span><span>Gemini</span><span class="chip-count" data-count="gemini"></span>
      </button>
      <button class="chip chip-opencode active" data-provider="opencode" aria-pressed="true">
        <span class="chip-dot"></span><span>OpenCode</span><span class="chip-count" data-count="opencode"></span>
      </button>
    </div>

    <div class="search">
      <svg viewBox="0 0 24 24" class="search-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="search" type="text" placeholder="Search sessions…" autocomplete="off" spellcheck="false" />
      <kbd class="kbd" id="search-kbd">/</kbd>
    </div>

    <button class="new-conv-btn" id="new-conv-btn" type="button" title="Spawn a fresh agent in tmux">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
      <span>New conversation</span>
    </button>

    <div class="sidebar-meta">
      <span id="session-count">0 sessions</span>
      <button class="btn-ghost" id="group-btn" title="Group by project / recency" aria-pressed="false">
        <svg class="group-recency" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <svg class="group-project" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </button>
      <button class="btn-ghost" id="refresh-btn" title="Re-scan ~/.claude">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/></svg>
      </button>
    </div>

    <div class="session-list" id="session-list" role="listbox" aria-label="Sessions"></div>

    <div class="workspaces-popover" id="workspaces-popover" hidden>
      <div class="workspaces-header">
        <span>Workspaces</span>
        <button class="workspaces-close" id="workspaces-close" aria-label="Close" title="Close">&times;</button>
      </div>
      <div class="workspaces-list" id="workspaces-list"></div>
      <form class="workspaces-save" id="workspaces-save">
        <input type="text" id="workspaces-save-name" placeholder="Save current as…" autocomplete="off" spellcheck="false" maxlength="64" />
        <button type="submit" id="workspaces-save-btn">Save</button>
      </form>
    </div>

    <footer class="sidebar-footer">
      <label class="switch" title="Poll active tabs for new messages">
        <input type="checkbox" id="poll-toggle" checked />
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span class="switch-label">Live</span>
      </label>
      <button class="btn-ghost" id="workspaces-btn" title="Open / save / delete workspaces" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Workspaces</span>
      </button>
      <button class="btn-ghost" id="reset-layout-btn" title="Reset to a single pane">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        <span>Reset layout</span>
      </button>
    </footer>
  </aside>

  <div class="sidebar-resizer" id="sidebar-resizer" role="separator" aria-orientation="vertical" title="Drag to resize · double-click to reset"></div>

  <main class="main" id="workspace" aria-label="Workspace"></main>
</div>

<div class="modal-backdrop palette-backdrop" id="palette-modal" hidden>
  <div class="palette" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="palette-input-row">
      <svg class="palette-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="palette-input" type="text" placeholder="Type a command, session, or workspace…" autocomplete="off" spellcheck="false" />
      <kbd class="kbd palette-kbd">Esc</kbd>
    </div>
    <div class="palette-list" id="palette-list" role="listbox"></div>
    <div class="palette-footer">
      <span><kbd class="kbd">↑</kbd><kbd class="kbd">↓</kbd> navigate</span>
      <span><kbd class="kbd">Enter</kbd> run</span>
      <span><kbd class="kbd">Ctrl</kbd>+<kbd class="kbd">K</kbd> toggle</span>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="new-conv-modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="new-conv-title">
    <header class="modal-header">
      <h2 id="new-conv-title">New conversation</h2>
      <button class="modal-close" id="new-conv-close" type="button" aria-label="Close">&times;</button>
    </header>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-label">Agent</div>
        <div class="provider-picker" id="new-conv-providers">
          <button type="button" class="provider-pick provider-claude" data-provider="claude">
            <span class="dot"></span><span>Claude</span>
          </button>
          <button type="button" class="provider-pick provider-codex" data-provider="codex">
            <span class="dot"></span><span>Codex</span>
          </button>
          <button type="button" class="provider-pick provider-gemini" data-provider="gemini">
            <span class="dot"></span><span>Gemini</span>
          </button>
          <button type="button" class="provider-pick provider-opencode" data-provider="opencode">
            <span class="dot"></span><span>OpenCode</span>
          </button>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-label">Working directory</div>
        <div class="dir-picker">
          <label class="dir-mode">
            <input type="radio" name="new-conv-mode" value="open" checked />
            <span>Open directory</span>
          </label>
          <input
            type="text"
            id="new-conv-workdir"
            class="dir-input"
            placeholder="~/projects/something"
            autocomplete="off"
            spellcheck="false"
          />
          <label class="dir-mode">
            <input type="radio" name="new-conv-mode" value="temp" />
            <span>Create temporary directory</span>
          </label>
          <div class="dir-hint">A fresh scratch dir under <code>/tmp/gently_*</code>.</div>
        </div>
      </div>
      <label class="modal-checkbox" id="new-conv-bypass-row">
        <input type="checkbox" id="new-conv-bypass" />
        <span>Run with <code>--dangerously-skip-permissions</code> (Claude only)</span>
      </label>
    </div>
    <footer class="modal-footer">
      <button class="btn" id="new-conv-cancel" type="button">Cancel</button>
      <button class="btn btn-primary" id="new-conv-start" type="button" disabled>Start</button>
    </footer>
  </div>
</div>

<div class="toast" id="toast" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/typescript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/diff.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script type="module" src="/static/js/app.js"></script>
</body>
</html>
